<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Panel Nutriólogo - Erazo System</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/nutriologo.css') }}"
    />
  </head>
  <body>
    <header class="topbar">
      <h1>Erazo System - Panel Nutriólogo</h1>
      <a href="{{ url_for('logout') }}" class="btn-logout">Cerrar Sesión</a>
    </header>

    <div class="dashboard">
      <input type="radio" name="tabs" id="tab-pacientes" checked />
      <input type="radio" name="tabs" id="tab-expedientes" />
      <input type="radio" name="tabs" id="tab-planes" />
      <input type="radio" name="tabs" id="tab-citas" />

      <nav class="sidebar">
        <label for="tab-pacientes" class="nav-item">Gestión de Pacientes</label>
        <label for="tab-expedientes" class="nav-item">
          Gestión de Expedientes
        </label>
        <label for="tab-planes" class="nav-item">Planes Alimenticios</label>
        <label for="tab-citas" class="nav-item">Agenda de Citas</label>
      </nav>

      <main class="content">
        <section id="content-pacientes" class="tab-content">
          <h2>Registrar Nuevo Paciente</h2>
          <form
            action="{{ url_for('registro_paciente') }}"
            method="POST"
            class="grid-form"
          >
            <div class="form-group">
              <label>Teléfono (ID) *</label>
              <input type="text" name="telefono" required />
            </div>
            <div class="form-group">
              <label>Nombre completo *</label>
              <input type="text" name="nombre" required />
            </div>
            <div class="form-group">
              <label>Edad *</label>
              <input type="number" name="edad" required />
            </div>
            <div class="form-group">
              <label>Peso (kg) *</label>
              <input type="number" step="0.1" name="peso" required />
            </div>
            <div class="form-group">
              <label>Estatura (m) *</label>
              <input type="number" step="0.01" name="estatura" required />
            </div>
            <div class="form-group">
              <label>Correo electrónico *</label>
              <input type="email" name="correo" required />
            </div>
            <div class="form-group">
              <label>Contraseña *</label>
              <input type="password" name="contrasena" required />
            </div>
            <div class="form-group full-width">
              <button type="submit" class="btn-success">
                Registrar Paciente
              </button>
            </div>
          </form>
        </section>

        <section id="content-expedientes" class="tab-content">
          <h2>Crear Expediente Clínico</h2>
          <form
            action="{{ url_for('crear_expediente') }}"
            method="POST"
            class="grid-form"
          >
            <div class="form-group">
              <label>Teléfono (ID) del Paciente *</label>
              <input type="text" name="telefono_exp" required />
            </div>
            <div class="form-group">
              <label>Objetivo nutricional *</label>
              <input type="text" name="objetivo" required />
            </div>
            <div class="form-group full-width">
              <label>Diagnóstico inicial *</label>
              <textarea name="diagnostico" required></textarea>
            </div>
            <div class="form-group full-width">
              <label>Observaciones médicas *</label>
              <textarea name="obs_medicas" required></textarea>
            </div>
            <div class="form-group full-width">
              <label>Historial clínico *</label>
              <textarea name="historial" required></textarea>
            </div>
            <div class="form-group full-width">
              <button type="submit" class="btn-success">
                Crear Expediente
              </button>
            </div>
          </form>
        </section>

        <section id="content-planes" class="tab-content">
          <h2>Asignar Plan Alimenticio</h2>
          <form
            action="{{ url_for('crear_plan') }}"
            method="POST"
            class="grid-form"
          >
            <div class="form-group">
              <label>Teléfono (ID) del Paciente *</label>
              <input type="text" name="telefono_plan" required />
            </div>
            <div class="form-group">
              <label>Objetivo nutricional *</label>
              <input type="text" name="objetivo_plan" required />
            </div>
            <div class="form-group">
              <label>Calorías diarias recomendadas *</label>
              <input type="number" name="calorias" required />
            </div>
            <div class="form-group full-width">
              <label>Lista de alimentos *</label>
              <textarea name="alimentos" required></textarea>
            </div>
            <div class="form-group full-width">
              <label>Horarios de comidas *</label>
              <textarea name="horarios" required></textarea>
            </div>
            <div class="form-group full-width">
              <label>Observaciones (Opcional)</label>
              <textarea name="obs_plan"></textarea>
            </div>
            <div class="form-group full-width">
              <button type="submit" class="btn-success">Asignar Plan</button>
            </div>
          </form>
        </section>

        <section id="content-citas" class="tab-content">
          <h2>Programar Nueva Cita</h2>
          <form
            action="{{ url_for('crear_cita') }}"
            method="POST"
            class="grid-form"
          >
            <div class="form-group">
              <label>Teléfono (ID) del Paciente *</label>
              <input type="text" name="telefono_cita" required />
            </div>
            <div class="form-group">
              <label>ID de la Cita *</label>
              <input type="text" name="id_cita" required />
            </div>
            <div class="form-group">
              <label>Fecha *</label>
              <input type="date" name="fecha" required />
            </div>
            <div class="form-group">
              <label>Hora *</label>
              <input type="time" name="hora" required />
            </div>
            <div class="form-group">
              <label>Motivo de la consulta *</label>
              <input type="text" name="motivo" required />
            </div>
            <div class="form-group">
              <label>Observaciones</label>
              <input type="text" name="obs_cita" />
            </div>
            <div class="form-group full-width">
              <button type="submit" class="btn-success">Agendar Cita</button>
            </div>
          </form>
        </section>
      </main>
    </div>
  </body>
</html>
