<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Erazo System - Registro de Usuario</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/login.css') }}"
    />
  </head>
  <body>
    <div class="login-container">
      <div class="login-card" style="max-width: 500px">
        <div class="text-container-login">
          <h2>Crear Cuenta</h2>
          <p>Complete los datos para registrarse en el sistema</p>
        </div>

        <form action="{{ url_for('register') }}" method="POST">
          <div class="form-group">
            <label for="nombre_completo">Nombre Completo *</label>
            <input
              type="text"
              id="nombre_completo"
              name="nombre_completo"
              required
              placeholder="Juan Pérez"
            />
          </div>

          <div class="form-group">
            <label for="correo">Correo electrónico *</label>
            <input
              type="email"
              id="correo"
              name="correo"
              required
              placeholder="ejemplo@correo.com"
            />
          </div>

          <div class="form-group">
            <label for="telefono">Teléfono *</label>
            <input
              type="tel"
              id="telefono"
              name="telefono"
              required
              placeholder="5512345678"
            />
          </div>

          <div class="form-group">
            <label for="rol">Tipo de Usuario *</label>
            <select
              id="rol"
              name="rol"
              required
              style="
                width: 100%;
                padding: 10px;
                border-radius: 5px;
                border: 1px solid #ccc;
              "
            >
              <option value="PACIENTE">Paciente</option>
              <option value="NUTRIOLOGO">Nutriólogo</option>
            </select>
          </div>

          <div class="form-group">
            <label for="contrasena">Contraseña *</label>
            <input
              type="password"
              id="contrasena"
              name="contrasena"
              required
              placeholder="••••••••"
            />
          </div>

          <div class="form-actions">
            <button type="submit" class="btn-primary">Registrarse</button>
          </div>

          <div class="form-links">
            <p>
              ¿Ya tienes cuenta?
              <a href="{{ url_for('auth.login') }}">Inicia sesión aquí</a>
            </p>
          </div>
        </form>
      </div>
    </div>
  </body>
</html>
